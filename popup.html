<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Clean Copy</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <!-- 顶部头 -->
    <header class="popup-header">
      <div class="logo-area">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="7" fill="url(#grad1)" />
            <path d="M8 10h12M8 14h8M8 18h10" stroke="#fff" stroke-width="2" stroke-linecap="round" />
            <circle cx="21" cy="19" r="4" fill="#00cec9" stroke="#1a1a2e" stroke-width="1.5" />
            <path d="M19.5 19l1 1 2-2" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"
              stroke-linejoin="round" />
            <defs>
              <linearGradient id="grad1" x1="0" y1="0" x2="28" y2="28">
                <stop offset="0%" stop-color="#6c5ce7" />
                <stop offset="100%" stop-color="#0984e3" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="logo-text">
          <h1>AI Clean Copy</h1>
          <p class="subtitle">面向 Word 的净化复制</p>
        </div>
      </div>
    </header>

    <!-- 选区状态 -->
    <div class="selection-status" id="selectionStatus">
      <div class="status-dot"></div>
      <span class="status-text">检测选区中...</span>
    </div>

    <!-- 操作按钮 -->
    <div class="actions">
      <button class="btn btn-primary" id="btnPlainText" title="Ctrl+C 空格">
        <span class="btn-icon">📄</span>
        <div class="btn-content">
          <span class="btn-title">复制为 Word 纯净文本</span>
          <span class="btn-desc">移除所有格式，最稳定</span>
        </div>
        <span class="btn-shortcut">Ctrl+C ␣</span>
      </button>

      <button class="btn btn-secondary" id="btnRichText" title="Ctrl+V 空格">
        <span class="btn-icon">📝</span>
        <div class="btn-content">
          <span class="btn-title">复制为 Word 清洁富文本</span>
          <span class="btn-desc">保留标题、加粗、代码块、表格</span>
        </div>
        <span class="btn-shortcut">Ctrl+V ␣</span>
      </button>
    </div>

    <!-- 清洗选项 -->
    <details class="options-panel">
      <summary class="options-toggle">
        <span>⚙️ 清洗选项</span>
        <span class="toggle-arrow">▶</span>
      </summary>
      <div class="options-content">
        <label class="option-item">
          <input type="checkbox" id="optCjkSpacing" checked>
          <span class="option-label">去除中英文间多余空格</span>
        </label>
        <label class="option-item">
          <input type="checkbox" id="optPreserveCode" checked>
          <span class="option-label">保留代码块缩进</span>
        </label>
        <label class="option-item">
          <input type="checkbox" id="optRemovePua" checked>
          <span class="option-label">移除 Unicode 私用区字符</span>
        </label>
        <label class="option-item">
          <input type="checkbox" id="optCollapseLines" checked>
          <span class="option-label">压缩过多空行</span>
        </label>
      </div>
    </details>

    <!-- 底部信息 -->
    <footer class="popup-footer">
      <span class="footer-text">v1.0.0</span>
      <span class="footer-divider">·</span>
      <span class="footer-text">选中 → 右键 或 点击按钮</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
